name: Verify Azure Function Endpoints

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: staging

permissions:
  id-token: write
  contents: read

jobs:
  verify-endpoints:
    name: Verify endpoints (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Function App name
        id: resolve
        shell: bash
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          RESOURCE_GROUP_INPUT: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          RESOURCE_GROUP="${RESOURCE_GROUP_INPUT:-rg-aos-${DEPLOY_ENV}}"
          PREFIX="func-business-infinity-${DEPLOY_ENV}-"
          FUNCTION_APP=$(az functionapp list \
            --resource-group "${RESOURCE_GROUP}" \
            --query "[?starts_with(name, '${PREFIX}')].name | [0]" \
            --output tsv)

          if [[ -z "${FUNCTION_APP}" ]]; then
            echo "::error::No Function App with prefix '${PREFIX}' found in '${RESOURCE_GROUP}'"
            exit 1
          fi

          echo "resource_group=${RESOURCE_GROUP}" >> "${GITHUB_OUTPUT}"
          echo "function_app=${FUNCTION_APP}" >> "${GITHUB_OUTPUT}"
          echo "::notice::Resolved Function App: ${FUNCTION_APP}"

      - name: Verify deployed functions and endpoints
        shell: bash
        env:
          FUNCTION_APP: ${{ steps.resolve.outputs.function_app }}
          RESOURCE_GROUP: ${{ steps.resolve.outputs.resource_group }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=5
          RETRY_DELAY_SECONDS=15
          FUNCTIONS_JSON='[]'
          COUNT=0

          if ! az functionapp sync-functions \
            --name "${FUNCTION_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --output none; then
            echo "::warning::Failed to sync functions before verification. Continuing with discovery checks."
          fi

          for ATTEMPT in $(seq 1 "${MAX_ATTEMPTS}"); do
            FUNCTIONS_JSON=$(az functionapp function list \
              --name "${FUNCTION_APP}" \
              --resource-group "${RESOURCE_GROUP}" \
              --output json)

            COUNT=$(jq 'length' <<< "${FUNCTIONS_JSON}")
            echo "::notice::Function count (attempt ${ATTEMPT}/${MAX_ATTEMPTS}): ${COUNT}"

            if [[ "${COUNT}" -gt 0 ]]; then
              break
            fi

            if [[ "${ATTEMPT}" -lt "${MAX_ATTEMPTS}" ]]; then
              echo "::warning::No functions discovered yet. Waiting ${RETRY_DELAY_SECONDS}s before retrying..."
              sleep "${RETRY_DELAY_SECONDS}"
            fi
          done

          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::No functions discovered in ${FUNCTION_APP} after ${MAX_ATTEMPTS} attempts"
            {
              echo "### ❌ Endpoint verification failed"
              echo ""
              echo "- Function App: \`${FUNCTION_APP}\`"
              echo "- Resource Group: \`${RESOURCE_GROUP}\`"
              echo "- Function count after retries: \`${COUNT}\`"
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "::group::Troubleshooting"
            az functionapp show \
              --name "${FUNCTION_APP}" \
              --resource-group "${RESOURCE_GROUP}" \
              --query "{state:state, defaultHostName:defaultHostName, hostNames:hostNames, kind:kind, lastModifiedTimeUtc:lastModifiedTimeUtc}" \
              --output json

            az functionapp config show \
              --name "${FUNCTION_APP}" \
              --resource-group "${RESOURCE_GROUP}" \
              --query "{linuxFxVersion:linuxFxVersion, alwaysOn:alwaysOn, minTlsVersion:minTlsVersion, preWarmedInstanceCount:preWarmedInstanceCount}" \
              --output json

            az functionapp config appsettings list \
              --name "${FUNCTION_APP}" \
              --resource-group "${RESOURCE_GROUP}" \
              --query "[?name=='WEBSITE_RUN_FROM_PACKAGE' || name=='FUNCTIONS_EXTENSION_VERSION' || name=='FUNCTIONS_WORKER_RUNTIME' || name=='PYTHONPATH' || name=='SCM_DO_BUILD_DURING_DEPLOYMENT']"
            echo "::endgroup::"
            exit 1
          fi

          echo "::group::Discovered functions"
          jq -r '.[] | "- \(.name)"' <<< "${FUNCTIONS_JSON}"
          echo "::endgroup::"

          HTTP_TRIGGER_COUNT=$(jq '
            map(select(any(.config.bindings[]?; .type == "httpTrigger")))
            | length
          ' <<< "${FUNCTIONS_JSON}")

          echo "::group::HTTP trigger endpoints"
          jq -r '
            .[]
            | .config.bindings as $bindings
            | select(any($bindings[]?; .type == "httpTrigger"))
            | "- \(.name): \(.invokeUrlTemplate // "No URL provided by Azure API")"
          ' <<< "${FUNCTIONS_JSON}"
          echo "::endgroup::"

          {
            echo "### ✅ Endpoint verification passed"
            echo ""
            echo "- Function App: \`${FUNCTION_APP}\`"
            echo "- Resource Group: \`${RESOURCE_GROUP}\`"
            echo "- Functions discovered: \`${COUNT}\`"
            echo "- HTTP triggers discovered: \`${HTTP_TRIGGER_COUNT}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${HTTP_TRIGGER_COUNT}" -eq 0 ]]; then
            echo "::warning::No HTTP triggers discovered. Verify function bindings if HTTP endpoints are expected."
          fi
